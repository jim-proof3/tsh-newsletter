  <script>
  /* Set OG meta and title based on URL params - must run synchronously in <head> for crawlers */
  (function() {
    var params = new URLSearchParams(window.location.search);
    var viewId = params.get('view');
    var type   = params.get('type') || 'all';
    if (!viewId) return; /* not an investor view */
    var isP3   = type === 'p3spv';
    var brand  = isP3 ? 'proof3' : 'The SageHouse';
    /* Extract month from viewId: monthly-all-may-2026 -> May 2026 */
    var monthMatch = viewId.match(/monthly-(?:all|p3spv)-(.+)/);
    var monthLabel = '';
    if (monthMatch) {
      monthLabel = monthMatch[1].replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }
    var title = brand + ' Investor Newsletter' + (monthLabel ? ' — ' + monthLabel : '');
    document.title = title;
    var ogTitle = document.querySelector('meta[property="og:title"]');
    var ogImg   = document.querySelector('meta[property="og:image"]');
    var ogDesc  = document.querySelector('meta[property="og:description"]');
    if (ogTitle) ogTitle.setAttribute('content', title);
    if (ogDesc)  ogDesc.setAttribute('content', 'Monthly investor update from ' + brand + '.');
    if (ogImg)   ogImg.setAttribute('content', 'https://jim-proof3.github.io/tsh-newsletter/' + (isP3 ? 'p3-logo.png' : 'sh-logo.png'));
  })();
  </script>

/* === CONTEXT FIELDS === */
function renderContextFields(type) {
  var brand  = (SHEET_CONFIGS[type] || {}).brand || 'sagehouse';
  var fields = [];
  if (brand === 'proof3')    fields = fields.concat(CONTEXT_FIELDS.proof3gym);
  if (brand === 'sagehouse') fields = fields.concat(CONTEXT_FIELDS.sagehouse);
  fields = fields.concat(CONTEXT_FIELDS.shared);
  if (type === 'p3spv')      fields = fields.concat(CONTEXT_FIELDS.spv1);
  var saved = {};
  var existing = document.querySelectorAll('#contextFieldsContainer input, #contextFieldsContainer textarea');
  for (var i = 0; i < existing.length; i++) saved[existing[i].id] = existing[i].value;
  var container = document.getElementById('contextFieldsContainer');
  if (!container) return;
  var html = '', buf = [];
  function flushBuf() {
    if (!buf.length) return;
    html += '<div class="input-row">';
    for (var b = 0; b < buf.length; b++) {
      html += '<div class="context-field"><label>' + buf[b].label + '</label>' +
              '<input type="number" id="' + buf[b].id + '" placeholder="' + (buf[b].placeholder||'') + '"></div>';
    }
    html += '</div>'; buf = [];
  }
  for (var f = 0; f < fields.length; f++) {
    var fd = fields[f];
    if (fd.type === 'number') { buf.push(fd); if (buf.length === 2) flushBuf(); }
    else {
      flushBuf();
      html += '<div class="context-field"><label>' + fd.label + '</label>' +
              '<textarea id="' + fd.id + '" rows="' + (fd.rows||2) + '" placeholder="' + (fd.placeholder||'') + '"></textarea></div>';
    }
  }
  flushBuf();
  container.innerHTML = html;
  /* Restore from within-session values first */
  for (var id in saved) { var el = document.getElementById(id); if (el && saved[id]) el.value = saved[id]; }
  /* Then restore from localStorage (cross-session persistence) */
  restoreContextFields();
  /* Wire up persistence listener */
  setupContextFieldPersistence();
}

/* === TYPE SWITCHING === */
function setType(type, cardEl) {
  if (!SHEET_CONFIGS[type]) return;
  if (isEditMode) {
    if (!confirm('You have unsaved edits. Save them now before switching?\n\nOK = save edits first\nCancel = discard edits and switch')) {
      /* discard: exit edit mode without saving */
      isEditMode = false; _editsDirty = false;
      var body = document.getElementById('newsletterBody');
      var btn  = document.getElementById('editToggleBtn');
      var tb   = document.getElementById('editToolbar');
      if (body) { body.contentEditable = 'false'; body.style.outline = 'none'; body.style.cursor = 'default'; }
      if (btn) btn.textContent = 'Edit';
      if (tb)  tb.classList.remove('visible');
    } else {
      /* save: commit edits then switch */
      var body = document.getElementById('newsletterBody');
      if (body) { newsletters[currentType] = body.innerHTML; autoSave(currentType, body.innerHTML, _lastRawMarkdown[currentType]); }
      isEditMode = false; _editsDirty = false;
      var btn = document.getElementById('editToggleBtn'); if (btn) btn.textContent = 'Edit';
      var tb  = document.getElementById('editToolbar');  if (tb)  tb.classList.remove('visible');
      if (body) { body.contentEditable = 'false'; body.style.outline = 'none'; body.style.cursor = 'default'; }
    }
  }
  currentType = type;
  var cfg = SHEET_CONFIGS[type];
  /* Sync both sidebar type cards and top bar type buttons */
  var cards = document.querySelectorAll('.type-card');
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove('active');
  if (cardEl && cardEl.classList.contains('type-card')) cardEl.classList.add('active');
  var topBtns = document.querySelectorAll('.top-bar-type-btn');
  for (var i = 0; i < topBtns.length; i++) {
    topBtns[i].classList.toggle('active', topBtns[i].getAttribute('data-type') === type);
  }
  var t = document.getElementById('outputTitle'); if (t) t.textContent = cfg.label + ' Newsletter';
  var m = document.getElementById('headerMeta');  if (m) m.textContent = cfg.label;
  document.documentElement.setAttribute('data-brand', cfg.brand);
  var lSH = document.getElementById('topBarLogoSH'), lP3 = document.getElementById('topBarLogoP3');
  if (lSH) lSH.style.display = cfg.brand === 'proof3' ? 'none' : 'block';
  if (lP3) lP3.style.display = cfg.brand === 'proof3' ? 'block' : 'none';
  setFavicon(cfg.brand);
  setTitle(type);
  saveContextFields(); /* save current type's fields before switching */
  renderContextFields(type); /* restoreContextFields called inside renderContextFields */
  var cp = document.getElementById('chartPickerPanel'); if (cp) cp.style.display = 'none';
  showNewsletterForType(type);
  /* If charts tab is currently active, re-render it for the new type */
  var chartsTabEl = document.getElementById('chartsTab');
  var nlTabEl     = document.getElementById('newsletterTab');
  if (chartsTabEl && chartsTabEl.style.display !== 'none') {
    renderChartsTab();
  }
  /* Reset custom charts and chart builder state for the new type */
  renderCustomChartsGrid(); /* show this type's custom charts */
  _multiTabPopulated = false; /* allow re-population for new type */
  /* Note: customCharts[type] preserved - charts persist per type */
}

(function() {
  var cards = document.querySelectorAll('[data-type]');
  for (var i = 0; i < cards.length; i++) {
    (function(card) {
      card.addEventListener('click', function() { setType(card.getAttribute('data-type'), card); });
    })(cards[i]);
  }
  renderContextFields(currentType);
  restoreContextFields();
  setupContextFieldPersistence();
  setFavicon((SHEET_CONFIGS[currentType]||{}).brand || 'sagehouse');
  setTitle(currentType);
  restoreAutoSaves();
})();

/* === NEWSLETTER STORAGE === */
function showNewsletterForType(type) {
  isEditMode = false;
  var eb = document.getElementById('editToggleBtn'); if (eb) eb.textContent = 'Edit';
  var tb = document.getElementById('editToolbar');   if (tb) tb.classList.remove('visible');
  var body = document.getElementById('newsletterBody');
  if (body) { body.contentEditable = 'false'; body.style.outline = 'none'; body.style.cursor = 'default'; }
  if (!newsletters[type]) {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('newsletterContent').style.display = 'none';
    document.getElementById('outputMeta').textContent = '';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('newsletterContent').style.display = 'block';

  /* Add narrow/wide view toggle button */
  var toggleBtn = document.createElement('button');
  toggleBtn.className = 'view-toggle-btn';
  toggleBtn.textContent = 'Wide View';
  toggleBtn.onclick = function() {
    document.body.classList.toggle('wide-view');
    toggleBtn.textContent = document.body.classList.contains('wide-view') ? 'Narrow View' : 'Wide View';
  };
  document.body.appendChild(toggleBtn);
  var charts = selectedCharts[type].length ? selectedCharts[type] : allCharts[type];
  renderNewsletter(newsletters[type], charts);
  /* Render charts immediately if newsletter tab is visible */
  requestAnimationFrame(function() {
    var nlTab = document.getElementById('newsletterTab');
    if (nlTab && nlTab.style.display !== 'none') renderNewsletterCharts();
  });
}

/* === TAB SWITCHING === */
function switchTab(tab, el) {
  if (_editsDirty && isEditMode) {
    var save = confirm('You have unsaved edits. Save before switching?');
    if (save) {
      var body = document.getElementById('newsletterBody');
      if (body) { newsletters[currentType] = body.innerHTML; autoSave(currentType, body.innerHTML); }
      _editsDirty = false;
    }
  }
  var tabs = document.getElementsByClassName('tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  if (el) el.classList.add('active');
  /* Sync top bar tabs too */
  var topTabs = document.querySelectorAll('.top-tab-btn');
  for (var j = 0; j < topTabs.length; j++) topTabs[j].classList.toggle('active', topTabs[j].getAttribute('data-tab') === tab);
  document.getElementById('newsletterTab').style.display = tab === 'newsletter' ? 'block' : 'none';
  document.getElementById('chartsTab').style.display     = tab === 'charts'     ? 'block' : 'none';
  if (tab === 'charts') {
    /* Always ensure sheet data + multi-tab data is loaded */
    if (!sheetDataCache) {
      var sel = document.getElementById('chartBuilderMetric');
      if (sel && !sel.querySelector('option[value]')) {
        sel.innerHTML = '<option value="">Loading sheet data...</option>';
      }
      fetchSheetData(currentType).then(function(sd) {
        if (sd) {
          sheetDataCache = sd;
          populateChartBuilderMetrics(sd, window._opsDataCache || null);
          prefillChartBuilderDates(sd.allRows);
          _multiTabPopulated = false;
          populateMultiTabChartBuilder();
        }
      }).catch(function() {});
    }
    if (!_multiTabPopulated) populateMultiTabChartBuilder();
    renderChartsTab();
  } else if (tab === 'newsletter') {
    /* Tab is now visible - render any pending inline charts */

function applyDatePreset() {

  if (row) row.style.display = preset === 'custom' ? 'block' : 'none';

               '36':'Last 36 months', ytd:'Year to date', custom:'Enter dates above' };

function parseRowDate(str) {
  if (!str) return null; str = String(str).trim();
  var mdy = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (mdy) return new Date(parseInt(mdy[3],10), parseInt(mdy[1],10)-1, 1);
  var ymd = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (ymd) return new Date(parseInt(ymd[1],10), parseInt(ymd[2],10)-1, 1);
  var MO = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  var parts = str.toLowerCase().split(/[\s,\/\-]+/), mi = -1, yr = null;
  for (var i = 0; i < parts.length; i++) {
    if (!yr && /^\d{4}$/.test(parts[i])) yr = parseInt(parts[i], 10);
    if (mi === -1) for (var m = 0; m < MO.length; m++) { if (parts[i].indexOf(MO[m]) === 0) { mi = m; break; } }
  }
  return (mi >= 0 && yr) ? new Date(yr, mi, 1) : null;
}

function getFilteredRows(allRows) {
  var sel = document.getElementById('dateRangePreset'), preset = sel ? sel.value : '12';
  if (preset === 'all') return allRows;
  if (preset === 'ytd') {
    var yr = new Date().getFullYear(), out = [];
    for (var i = 0; i < allRows.length; i++) { var d = parseRowDate(allRows[i][0]); if (d && d.getFullYear() === yr) out.push(allRows[i]); }
    return out.length ? out : allRows.slice(-12);
  }
  if (preset === 'custom') {
    var sv = getVal('dateStart'), ev = getVal('dateEnd');
    if (!sv || !ev) return allRows.slice(-12);
    var sd = new Date(sv + '-01'), ed = new Date(ev + '-01'), out = [];
    for (var i = 0; i < allRows.length; i++) { var d = parseRowDate(allRows[i][0]); if (d && d >= sd && d <= ed) out.push(allRows[i]); }
    return out.length ? out : allRows;
  }
  var n = parseInt(preset, 10); return isNaN(n) ? allRows.slice(-12) : allRows.slice(-n);
}

function getRangeLabel(preset, earliest, latest) {
  if (preset === 'all')    return 'all data (' + earliest + ' to ' + latest + ')';
  if (preset === 'ytd')    return 'year to date ' + new Date().getFullYear();
  if (preset === 'custom') return (getVal('dateStart') || '?') + ' to ' + (getVal('dateEnd') || '?');
  return 'last ' + preset + ' months';
}

/* === CSV PARSE === */
function parseCsvLine(line) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim()); return result;
}

function fmtVal(v) {
  if (v === null || v === undefined || v === '') return '0';
  var s = String(v).trim(), cl = s.replace(/[$,%]/g, ''), n = parseFloat(cl);
  if (isNaN(n)) return s;
  if (s.indexOf('%') >= 0)       return n.toFixed(1) + '%';
  if (Math.abs(n) >= 1000000)    return '$' + (n / 1000000).toFixed(2) + 'M';
  if (Math.abs(n) >= 1000)       return '$' + (n / 1000).toFixed(1) + 'k';
  return s;
}

function rowsToTable(rows, hdr) {
  if (!rows || !rows.length) return 'No data.\n';
  /* Send all columns - sheet has ~37 meaningful metrics */
  var maxCols = Math.min(hdr.length, 60);
  var hdrs = hdr.slice(1, maxCols).filter(function(h) { return h && h.trim(); });
  var t = 'Date\t' + hdrs.join('\t') + '\n----\n';
  for (var i = 0; i < rows.length; i++) {
    var v = [fmtVal(rows[i][0])]; /* date */
    for (var j = 1; j < maxCols && j < rows[i].length; j++) {
      if (hdr[j] && hdr[j].trim()) v.push(fmtVal(rows[i][j]));
    }
    t += v.join('\t') + '\n';
  }
  return t;
}

async function fetchSheetData(type) {
  var cfg = SHEET_CONFIGS[type]; if (!cfg) throw new Error('Unknown type: ' + type);
  var url = 'https://docs.google.com/spreadsheets/d/' + cfg.sheetId + '/export?format=csv&gid=' + cfg.gid;
  var resp = await fetch(url);
  if (!resp.ok) throw new Error('Sheet HTTP ' + resp.status + '. Check sharing settings.');
  var csv = await resp.text();
  var lines = csv.split('\n').filter(function(l) { return l.trim(); });
  if (lines.length < 3) throw new Error('Sheet appears empty.');
  var rows = lines.map(parseCsvLine);
  var hIdx = 0;
  outer: for (var i = 0; i < Math.min(rows.length, 10); i++) {
    for (var j = 0; j < rows[i].length; j++) {
      if (/jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|\d{1,2}\/\d{1,2}\/\d{4}/i.test(rows[i][j])) { hIdx = i; break outer; }
    }
  }
  var hdr = rows[hIdx], allRows = [];
  for (var i = hIdx + 1; i < rows.length; i++) { if (rows[i][0] && /\d/.test(rows[i][0])) allRows.push(rows[i]); }
  if (!allRows.length) throw new Error('No data rows found.');
  return { tabName:cfg.tabName, hdr:hdr, allRows:allRows, allTime:rowsToTable(allRows,hdr),
           rowCount:allRows.length, earliestDate:allRows[0][0], latestDate:allRows[allRows.length-1][0] };
}

    var resp = await fetch(url);

    var csv  = await resp.text();
    var csvLines = csv.split('\n').filter(function(l) { return l.trim(); });
    if (csvLines.length < 2) return null;
    var rows = csvLines.map(parseCsvLine);
    var hdrIdx = -1;
    for (var i = 0; i < Math.min(rows.length, 15); i++) {
      for (var j = 0; j < rows[i].length; j++) {

      for (var i = 0; i < hdr.length; i++) { if (hdr[i] && hdr[i].trim() === name) return i; }
      return -1;
    }
    var idxMap = { date: 0 };
    for (var key in OPS_COL_MAP) idxMap[key] = colIdx(OPS_COL_MAP[key]);
    var dataRows = [];
    for (var i = hdrIdx + 1; i < rows.length; i++) {
      var r = rows[i];

      if (idxMap.aggregate >= 0 && !(r[idxMap.aggregate] || '').trim()) continue;
      dataRows.push(r);

var _tabDataCache = {};   /* keyed by tab id */

async function fetchTabData(tab) {
  if (_tabDataCache[tab.id]) return _tabDataCache[tab.id];
  if (!tab.gid || tab.gid.indexOf('PENDING') === 0) return null;
  var url = 'https://docs.google.com/spreadsheets/d/' + DATA_SHEET_ID + '/export?format=csv&gid=' + tab.gid;
  try {
    var resp = await fetch(url);
    if (!resp.ok) return null;
    var csv = await resp.text();
    var lines = csv.split('\n').filter(function(l) { return l.trim(); });
    if (lines.length < 2) return null;
    var rows = lines.map(parseCsvLine);
    /* Find header row */
    var hdrIdx = 0;
    if (tab.anchor) {
      for (var i = 0; i < Math.min(rows.length, 15); i++) {
        if (rows[i].indexOf(tab.anchor) >= 0) { hdrIdx = i; break; }
      }
    } else {
      /* Find first row where col[0] looks like a date */
      for (var i = 0; i < Math.min(rows.length, 15); i++) {
        if (/\d{1,2}\/\d{1,2}\/\d{2,4}/.test(rows[i][0] || '')) { hdrIdx = Math.max(0, i - 1); break; }
      }
    }
    var hdr = rows[hdrIdx];
    var dataRows = [];
    for (var i = hdrIdx + 1; i < rows.length; i++) {
      if (rows[i][0] && /\d/.test(rows[i][0])) dataRows.push(rows[i]);
    }
    var result = { tab: tab, hdr: hdr, dataRows: dataRows };
    _tabDataCache[tab.id] = result;
    return result;
  } catch(e) { console.log('Chart builder: ' + tab.label + ' not available — skipping.'); return null; }
}

function resolveMetricSel(selId) {
  var sel = document.getElementById(selId);
  if (!sel || !sel.value) return null;
  var val = sel.value;

  /* Legacy ops: format */
  if (val.indexOf('ops:') === 0) {
    var ci = parseInt(val.replace('ops:', ''), 10);
    var ops = window._opsDataCache;
    if (!ops) return null;
    return { colIdx: ci, name: ops.hdr[ci] || 'Metric', sourceRows: ops.dataRows };
  }

  /* New multi-tab format: tabId:colIdx */
  var parts = val.split(':');
  if (parts.length >= 2) {
    var tabId = parts[0], colIdx = parseInt(parts[parts.length - 1], 10);
    var cached = _tabDataCache[tabId];
    if (!cached) {
      /* Tab not loaded yet - try to fetch it synchronously-ish */
      showStatus('loading', 'Loading tab data...');
      /* Find the tab config */
      var tabCfg = null;
      for (var t = 0; t < CHART_BUILDER_TABS.length; t++) {
        if (CHART_BUILDER_TABS[t].id === tabId) { tabCfg = CHART_BUILDER_TABS[t]; break; }
      }
      if (tabCfg) {
        fetchTabData(tabCfg).then(function() {
          showStatus('success', 'Tab loaded. Try adding the chart again.');
        });
      }
      return null;
    }
    return { colIdx: colIdx, name: (cached.hdr[colIdx] || 'Metric'), sourceRows: cached.dataRows };
  }

  /* Legacy financial: just a number */
  var colIdx2 = parseInt(val, 10);
  if (!isNaN(colIdx2) && sheetDataCache) {
    return { colIdx: colIdx2, name: sheetDataCache.hdr[colIdx2] || 'Metric', sourceRows: sheetDataCache.allRows };
  }
  return null;
}

    allCharts[currentType]      = extractCharts(text);
    selectedCharts[currentType] = allCharts[currentType].slice();
    populateChartBuilderMetrics(sd, opsData);

    isEditMode = false;

}

/* === TABLE OF CONTENTS === */
function buildTOC(container) {
  var allHeaders = container.querySelectorAll('h1, h2, h3');
  /* Filter out headers that are empty or only contain images */
  var headers = [];
  for (var hi = 0; hi < allHeaders.length; hi++) {
    var text = allHeaders[hi].textContent.trim();
    if (text.length > 0) headers.push(allHeaders[hi]);
  }
  if (!headers.length) return null;
  var toc = document.createElement('div'); toc.className = 'newsletter-toc'; toc.id = 'newsletter-toc';
  var ttl = document.createElement('div'); ttl.className = 'newsletter-toc-title'; ttl.textContent = 'Contents';
  toc.appendChild(ttl);
  for (var i = 0; i < headers.length; i++) {
    var h = headers[i], anchor = 'section-' + i; h.id = anchor;
    var link = document.createElement('a'); link.href = '#' + anchor; link.textContent = h.textContent;
    link.className = 'toc-' + h.tagName.toLowerCase();
    link.onclick = (function(a) { return function(e) { e.preventDefault(); var t = document.getElementById(a); if (t) t.scrollIntoView({ behavior:'smooth' }); }; })(anchor);
    toc.appendChild(link);
  }
  return toc;
}

function updateTOC() {
  var body = document.getElementById('newsletterBody'); if (!body) return;
  var ex = document.getElementById('newsletter-toc'); if (ex) ex.parentNode.removeChild(ex);
  var toc = buildTOC(body); if (toc) body.insertBefore(toc, body.firstChild);
}

/* === EDIT MODE === */
function insertHeader(level) {
  var body = document.getElementById('newsletterBody'); if (!body || !isEditMode) return;
  /* Check if current block is already this level - if so, toggle back to paragraph */
  var sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    var node = sel.anchorNode;
    while (node && node !== body) {
      if (node.nodeName === 'H' + level) {
        /* Already this heading - revert to paragraph */
        document.execCommand('formatBlock', false, 'p');
        updateTOC();
        return;
      }
      node = node.parentNode;
    }
  }
  document.execCommand('formatBlock', false, 'h' + level);
  updateTOC();
}


function insertLink() {

/* === DRAG & DROP IMAGES === */
function setupDragDrop(body) {
  body._dgo = function(e) { e.preventDefault(); e.stopPropagation(); body.classList.add('drag-over'); };
  body._dgl = function()  { body.classList.remove('drag-over'); };
  body._ddr = function(e) {
    e.preventDefault(); e.stopPropagation(); body.classList.remove('drag-over');
    var files = e.dataTransfer.files;
    for (var i = 0; i < files.length; i++) { if (files[i].type.indexOf('image') === 0) readAndInsertImage(files[i]); }
  };
  body.addEventListener('dragover', body._dgo); body.addEventListener('dragleave', body._dgl); body.addEventListener('drop', body._ddr);
}
function teardownDragDrop(body) {
  if (body._dgo) body.removeEventListener('dragover',  body._dgo);
  if (body._dgl) body.removeEventListener('dragleave', body._dgl);
  if (body._ddr) body.removeEventListener('drop',      body._ddr);
}
function insertImage(input) { var f = input.files[0]; if (f) readAndInsertImage(f); input.value = ''; }
function readAndInsertImage(file) {
  /* Capture cursor position BEFORE async read (toolbar click may have moved focus) */
  var savedRange = _savedEditRange;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.createElement('img'); img.src = e.target.result;
    img.style.cssText = 'max-width:100%;border-radius:8px;display:block;';
    /* Wrap in a draggable container */
    var wrapper = document.createElement('div');
    wrapper.className = 'image-draggable';
    wrapper.setAttribute('contenteditable', 'false');
    wrapper.setAttribute('draggable', 'true');
    wrapper.style.cssText = 'margin:16px 0;position:relative;cursor:grab;';
    wrapper.innerHTML = '<div style="display:flex;justify-content:flex-end;margin-bottom:4px;">' +
      '<span style="font-size:11px;color:var(--muted);user-select:none;cursor:grab;" title="Drag to reposition">&#8597; drag</span>' +
      '<button onclick="this.closest(\'.image-draggable\').remove();showStatus(\'.success\',\'Image removed.\');" style="border:none;background:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 0 0 8px;user-select:none;" title="Remove image">&#10005;</button>' +
      '</div>';
    wrapper.appendChild(img);
    var body = document.getElementById('newsletterBody'); if (!body) return;
    /* Use saved cursor position from before toolbar click */
    var range = savedRange;
    if (range && body.contains(range.startContainer)) {
      var toc = document.getElementById('newsletter-toc');
      if (toc && toc.contains(range.startContainer)) {
        if (toc.nextSibling) body.insertBefore(wrapper, toc.nextSibling);
        else body.appendChild(wrapper);
      } else {
        range.collapse(false); range.insertNode(wrapper);
        var after = document.createRange(); after.setStartAfter(wrapper); after.collapse(true);
        var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(after);
      }
    } else {
      body.appendChild(wrapper);
    }
    /* Set up drag on the new wrapper */
    if (isEditMode) setupImageDrag(wrapper);
    showStatus('success', 'Image inserted. Drag to reposition.');
  };
  reader.readAsDataURL(file);
}

/* === RENDER NEWSLETTER === */
function extractCharts(text) {
  var charts = [], pos = 0;
  while (true) {
    var s = text.indexOf(CHART_OPEN, pos); if (s === -1) break;
    var js = text.indexOf('\n', s); if (js === -1) break; js++;
    var e = text.indexOf(FENCE_CLOSE, js); if (e === -1) break;
    try { charts.push(JSON.parse(text.substring(js, e).trim())); } catch(ex) { console.warn('Chart parse error'); }
    pos = e + FENCE_CLOSE.length;
  }
  return charts;
}

function mdToHtml(text) {
  return text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
    .replace(/^# (.+)$/gm,   '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,   '<em>$1</em>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/^(?!<[hp])(.+)$/gm, '<p>$1</p>')
    .replace(/<p><\/p>/g, '').trim();
}

/* Pending inline charts - rendered when newsletter tab becomes visible */
var _pendingInlineCharts = [];

function renderNewsletterCharts() {
  /* Called when newsletter tab is shown - canvases now have real dimensions */
  var body = document.getElementById('newsletterBody'); if (!body) return;
  for (var i = 0; i < _pendingInlineCharts.length; i++) {
    var c = document.getElementById('chart-inline-' + i);
    if (c) {
      destroyChart(c.id);
      renderSingleChart(c, _pendingInlineCharts[i]);
    }
  }
  /* Also resize any existing instances (catches tab-switch reflow) */
  for (var id in _chartRegistry) {
    try { if (_chartRegistry[id]) _chartRegistry[id].resize(); } catch(e) {}
  }
}

function renderNewsletter(text, charts) {
  var body = document.getElementById('newsletterBody'); if (!body) return;
  charts = charts || selectedCharts[currentType] || [];
  var ci = 0, html = '', pos = 0;
  while (true) {
    var s = text.indexOf(CHART_OPEN, pos); if (s === -1) { html += mdToHtml(text.substring(pos)); break; }
    html += mdToHtml(text.substring(pos, s));
    var e = text.indexOf(FENCE_CLOSE, s + CHART_OPEN.length); if (e === -1) { html += mdToHtml(text.substring(pos)); break; }
    var chartTitle = (charts[ci] && charts[ci].title) ? charts[ci].title : ('Chart ' + (ci+1));
    var id = 'chart-inline-' + ci; ci++;
    html += '<div class="chart-embed"><div class="chart-embed-title">' + chartTitle + '</div><canvas id="' + id + '" height="180"></canvas></div>';
    pos = e + FENCE_CLOSE.length;
  }
  /* Store charts for deferred render */
  _pendingInlineCharts = charts.slice();
  /* Destroy old instances */
  for (var cid in _chartRegistry) { if (cid.indexOf('chart-inline-') === 0) destroyChart(cid); }
  body.innerHTML = html;
  body.contentEditable = isEditMode ? 'true' : 'false';
  body.style.outline   = isEditMode ? '2px solid var(--primary)' : 'none';
  body.onmouseup = saveCursorPosition;
  body.onkeyup   = saveCursorPosition;
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      updateTOC();
      /* Only render charts if tab is visible (not display:none) */
      var tab = document.getElementById('newsletterTab');
      if (tab && tab.style.display !== 'none') {
        renderNewsletterCharts();
      }
      /* else: charts will render when tab is switched to via switchTab() */
      var draggables = body.querySelectorAll('.chart-draggable');
      for (var d = 0; d < draggables.length; d++) setupChartDrag(draggables[d]);
    });
  });
}

/* === SHARE (KV) === */
async function shareNewsletter() {
  var text = newsletters[currentType];
  if (!text) { showStatus('error', 'Generate a newsletter first.'); return; }

  /* Ask for month/year label */
  var now = new Date();
  var defaultLabel = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  var monthLabel = prompt('Month/Year for this newsletter (e.g. "April 2026"):', defaultLabel);
  if (!monthLabel || !monthLabel.trim()) return;
  monthLabel = monthLabel.trim();

  showStatus('loading', 'Saving newsletter for ' + monthLabel + '...');
  try {
    var cfg = SHEET_CONFIGS[currentType] || {};
    var body = document.getElementById('newsletterBody');
    var content = body ? body.innerHTML : text;
    var brand = cfg.brand === 'proof3' ? 'proof3' : 'The SageHouse';

    /* Build deterministic KV key: monthly-TYPE-month-year (lowercase, no spaces) */
    var slug = monthLabel.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    var kvId = 'monthly-' + currentType + '-' + slug;

    var resp = await fetch(WORKER_URL + '/newsletter', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id:       kvId,
        text:     content,
        charts:   allCharts[currentType] || [],
        type:     currentType,
        title:    brand + ' Investor Newsletter — ' + monthLabel,
        name:     monthLabel,
        named:    true,
        monthLabel: monthLabel
      })
    });
    if (!resp.ok) throw new Error('Worker ' + resp.status);
    var result = await resp.json();
    if (result.error) throw new Error(result.error);

    var shareUrl = WORKER_URL + '/view/' + kvId + '?type=' + currentType;

    /* Update OG meta */
    var ogTitle = document.getElementById('og-title');
    var ogImg   = document.getElementById('og-image');
    if (ogTitle) ogTitle.setAttribute('content', brand + ' Investor Newsletter — ' + monthLabel);
    if (ogImg) ogImg.setAttribute('content', 'https://jim-proof3.github.io/tsh-newsletter/' + (cfg.brand === 'proof3' ? 'p3-logo.png' : 'sh-logo.png'));

    /* Store reference locally for Saves panel */
    storeCloudSaveRef(kvId, monthLabel + ' — ' + brand, currentType, brand + ' Investor Newsletter — ' + monthLabel);
    /* Also store the share URL for easy retrieval */
    try {
      var refs = getCloudSaveRefs();
      if (refs.length > 0 && refs[0].id === kvId) { refs[0].shareUrl = shareUrl; }
      localStorage.setItem(CLOUD_REFS_KEY, JSON.stringify(refs));
    } catch(e) {}

    /* Copy to clipboard */
    try {
      await navigator.clipboard.writeText(shareUrl);
      showStatus('success', 'Investor link copied for ' + monthLabel + ': ' + shareUrl);
    } catch(clipErr) {
      window.prompt('Copy this investor link:', shareUrl);
      showStatus('success', 'Link ready for ' + monthLabel);
    }
  } catch(err) {
    console.error('Share error:', err);
    showStatus('error', 'Share failed: ' + err.message);
  }
}

      card.className = 'chart-card'; card.setAttribute('data-custom-chart', idx);
      card.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
        '<div class="chart-card-title" style="font-size:13px;">' + chart.title + '</div>' +
        '<div style="display:flex;gap:8px;align-items:center;">' +
        '<button onclick="insertChartAtSection(' + idx + ')" style="padding:3px 10px;background:var(--primary);color:white;border:none;border-radius:4px;font-size:11px;cursor:pointer;font-weight:700;">Insert →</button>' +
        '<button onclick="removeCustomChart(' + idx + ')" style="border:none;background:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0;">&#10005;</button>' +
        '</div></div>' +
        '<canvas id="custom-tab-' + idx + '" height="200"></canvas>';
      grid.appendChild(card);
      setTimeout(function() { var c = document.getElementById('custom-tab-' + idx); if (c) renderSingleChart(c, chart); }, 60);
    })(customList[ci], ci);
  }
}
/* Track all Chart.js instances by canvas ID so we can destroy before re-creating */
var _chartRegistry = {};

function destroyChart(canvasId) {
  if (_chartRegistry[canvasId]) {
    try { _chartRegistry[canvasId].destroy(); } catch(e) {}
    delete _chartRegistry[canvasId];
  }
  /* Also check Chart.js internal registry */
  try {
    var existing = Chart.getChart(canvasId);
    if (existing) existing.destroy();
  } catch(e) {}
}

function fmtTick(v) {
  if (Math.abs(v) >= 1000000) return '$' + (v/1000000).toFixed(1) + 'M';
  if (Math.abs(v) >= 1000)    return '$' + (v/1000).toFixed(0) + 'k';
  return v;
}

function fmtTooltip(ctx) {
  var v = ctx.parsed.y;
  if (Math.abs(v) >= 1000000) return ctx.dataset.label + ': $' + (v/1000000).toFixed(2) + 'M';
  if (Math.abs(v) >= 1000)    return ctx.dataset.label + ': $' + (v/1000).toFixed(1) + 'k';
  return ctx.dataset.label + ': ' + v;
}

function getSeriesColor(si, s, brand) {
  if (brand === 'proof3') {
    /* Maximum contrast on dark navy - white, orange, green, pink */
    var p3palette = ['#ffffff', '#ffb347', '#7dffb3', '#ff85c0'];
    return s.color || p3palette[si % p3palette.length];
  }
  var shpalette = ['#13474A', '#C0632A', '#4A6FA5', '#89B9AB'];
  return s.color || shpalette[si % shpalette.length];
}

function renderSingleChart(canvas, chart) {
  if (!chart || !chart.data || !chart.series || !chart.data.length) return null;

  /* Destroy any existing instance on this canvas first */
  destroyChart(canvas.id);

  var colors = getColors();
  var brand  = document.documentElement.getAttribute('data-brand');
  var labels = chart.data.map(function(d) { return (typeof d === 'string') ? d : (d.date || d.month || ''); });
  var chartType = chart.type === 'area' ? 'line' : (chart.type || 'bar');

  /* === DUAL Y-AXIS (type: 'dual') === */
  if (chart.type === 'dual' && chart.series.length >= 2) {
    return renderDualAxisChart(canvas, chart, labels, colors, brand);
  }

  /* === STANDARD SINGLE-AXIS (bar / line / area / multi) === */
  var datasets = chart.series.map(function(s, si) {
    var color = getSeriesColor(si, s, brand);
    /* Support both new format (s.values array) and old format (d[s.key] row objects) */
    var vals;
    if (s.values && s.values.length) {
      vals = s.values;
    } else {
      vals = chart.data.map(function(d) {
        if (typeof d === 'string') return 0;
        return typeof d[s.key] === 'number' ? d[s.key] : (parseFloat(String(d[s.key] || '').replace(/[$,%]/g,'')) || 0);
      });
    }
    var isBar = chart.type === 'bar';
    return {
      label: s.name, data: vals, yAxisID: 'y',
      backgroundColor: isBar ? vals.map(function(v) { return v < 0 ? colors.negative+'55' : color+'55'; }) : color+'33',
      borderColor:     isBar ? vals.map(function(v) { return v < 0 ? colors.negative        : color;       }) : color,
      borderWidth: colors.borderWidth || 2, fill: chart.type === 'area', tension: 0.35,
      pointRadius: colors.pointRadius || (chart.data.length > 24 ? 1 : 3), pointHoverRadius: 6
    };
  });

  try {
    var instance = new Chart(canvas, {
      type: chartType,
      data: { labels: labels, datasets: datasets },
      options: {
        responsive: true,
        backgroundColor: colors.chartBg,
        plugins: {
          legend: { display: datasets.length > 1, position: 'bottom',
            labels: { font:{size:10}, boxWidth:10, padding:10, color:colors.text } },
          tooltip: { backgroundColor: colors.tooltipBg || '#fff',
            titleColor: colors.text, bodyColor: colors.text,
            borderColor: colors.grid, borderWidth: 1,
            callbacks: { label: fmtTooltip } }
        },
        scales: {
          y: { grid:{color:colors.grid, lineWidth:1},
               ticks:{color:colors.text, font:{size:10}, callback:fmtTick},
               border:{color:colors.grid} },
          x: { grid:{display:false},
               ticks:{color:colors.text, font:{size:9}, maxTicksLimit:chart.data.length>24?12:24, maxRotation:45},
               border:{color:colors.grid} }
        }
      }
    });
    _chartRegistry[canvas.id] = instance;
    return instance;
  } catch(e) { console.error('Chart render error:', e); return null; }
}

/* === DUAL Y-AXIS CHART === */
function renderDualAxisChart(canvas, chart, labels, colors, brand) {
  var s0 = chart.series[0], s1 = chart.series[1];
  var c0 = getSeriesColor(0, s0, brand), c1 = getSeriesColor(1, s1, brand);
  var vals0 = chart.data.map(function(d) { return parseFloat(String(d[s0.key]||0).replace(/[$,%]/g,'')) || 0; });
  var vals1 = chart.data.map(function(d) { return parseFloat(String(d[s1.key]||0).replace(/[$,%]/g,'')) || 0; });

  /* Determine bar vs line per series */
  var t0 = s0.chartType || 'bar';
  var t1 = s1.chartType || 'line';

  var datasets = [
    {
      label: s0.name, data: vals0, yAxisID: 'y',
      type: t0,
      backgroundColor: t0==='bar' ? vals0.map(function(v){return v<0?colors.negative+'55':c0+'55';}) : c0+'33',
      borderColor:     t0==='bar' ? vals0.map(function(v){return v<0?colors.negative:c0;}) : c0,
      borderWidth:2, fill:false, tension:0.35,
      pointRadius:chart.data.length>24?1:3, pointHoverRadius:5
    },
    {
      label: s1.name, data: vals1, yAxisID: 'y2',
      type: t1,
      backgroundColor: t1==='bar' ? vals1.map(function(v){return v<0?colors.negative+'55':c1+'55';}) : c1+'33',
      borderColor:     t1==='bar' ? vals1.map(function(v){return v<0?colors.negative:c1;}) : c1,
      borderWidth:2, fill:false, tension:0.35,
      pointRadius:chart.data.length>24?1:3, pointHoverRadius:5
    }
  ];

  try {
    var instance = new Chart(canvas, {
      type: 'bar',  /* outer type; each dataset overrides */
      data: { labels: labels, datasets: datasets },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true, position: 'bottom', labels: { font:{size:10}, boxWidth:10, padding:10, color:colors.text } },
          tooltip: { callbacks: { label: fmtTooltip } }
        },
        scales: {
          y:  { position:'left',  grid:{color:colors.grid}, ticks:{color:c0, font:{size:10}, callback:fmtTick}, title:{display:!!(s0.axisLabel), text:s0.axisLabel||'', color:c0, font:{size:10}} },
          y2: { position:'right', grid:{drawOnChartArea:false}, ticks:{color:c1, font:{size:10}, callback:fmtTick}, title:{display:!!(s1.axisLabel), text:s1.axisLabel||'', color:c1, font:{size:10}} },
          x:  { grid:{display:false}, ticks:{color:colors.text, font:{size:9}, maxTicksLimit:chart.data.length>24?12:24, maxRotation:45} }
        }
      }
    });
    _chartRegistry[canvas.id] = instance;
    return instance;
  } catch(e) { console.error('Dual axis chart error:', e); return null; }
}

/* === EXPORT === */
function stripCharts(text) {
  var result = '', pos = 0;
  while (true) {
    var s = text.indexOf(CHART_OPEN, pos); if (s === -1) { result += text.substring(pos); break; }
    result += text.substring(pos, s);
    var e = text.indexOf(FENCE_CLOSE, s + CHART_OPEN.length); if (e === -1) break;
    pos = e + FENCE_CLOSE.length;
  }
  return result.trim();
}
function getExportText() {
  var body = document.getElementById('newsletterBody');
  if (body) return body.innerText;
  var stored = newsletters[currentType];
  return stored ? stripCharts(stored) : '';
}
function getExportHtml() {
  var body = document.getElementById('newsletterBody');
  if (body) return body.innerHTML;
  return newsletters[currentType] || '';
}
function copyNewsletter() {
  var t = getExportText(); if (!t) { showStatus('error','Nothing to copy.'); return; }
  navigator.clipboard.writeText(t).then(function() { showStatus('success','Copied.'); }).catch(function() { showStatus('error','Copy failed.'); });
}
function exportToDoc() {
  var htmlContent = getExportHtml();
  var textContent = getExportText();
  if (!textContent) { showStatus('error','Nothing to export.'); return; }
  /* Copy rich HTML to clipboard so paste into Google Docs preserves formatting */
  try {
    var blob = new Blob([htmlContent], { type: 'text/html' });
    var textBlob = new Blob([textContent], { type: 'text/plain' });
    var item = new ClipboardItem({
      'text/html': blob,
      'text/plain': textBlob
    });
    navigator.clipboard.write([item]).then(function() {
      showStatus('success', 'Copied with formatting. Opening Google Docs — paste with Cmd+V.');
      setTimeout(function() { window.open('https://docs.google.com/document/create', '_blank'); }, 800);
    }).catch(function() {
      /* Fallback: copy plain text */
      navigator.clipboard.writeText(textContent).then(function() {
        showStatus('success', 'Copied as text. Opening Google Docs.');
        setTimeout(function() { window.open('https://docs.google.com/document/create', '_blank'); }, 800);
      });
    });
  } catch(e) {
    navigator.clipboard.writeText(textContent).then(function() {
      showStatus('success', 'Copied as text. Opening Google Docs.');
      setTimeout(function() { window.open('https://docs.google.com/document/create', '_blank'); }, 800);
    });
  }
}

/* === AUTO-SAVE & NAMED SAVES === */

var AUTOSAVE_KEY_PREFIX = 'sh_newsletter_autosave_';

/* Auto-save: write to localStorage AND KV (for cross-browser restore) */
function autoSave(type, text) {
  if (!text) return;
  var cfg = SHEET_CONFIGS[type] || {};
  /* Always grab the current charts array for this type */
  var chartsToStore = allCharts[type] || [];
  var payload = {
    text: text, savedAt: new Date().toISOString(),
    type: type, label: cfg.label || type,
    charts: chartsToStore
  };
  /* localStorage */
  try { localStorage.setItem(AUTOSAVE_KEY_PREFIX + type, JSON.stringify(payload)); } catch(e) {}
  /* KV */
  try {
    fetch(WORKER_URL + '/newsletter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id:       AUTOSAVE_KV_ID[type],
        text:     text,
        charts:   chartsToStore,
        type:     type,
        title:    (cfg.label || type) + ' Newsletter',
        autoSave: true
      })
    }).catch(function(e) { console.warn('KV auto-save failed:', e); });
  } catch(e) {}
}

/* Load auto-saved newsletter from localStorage */
function loadAutoSave(type) {
  try {
    var raw = localStorage.getItem(AUTOSAVE_KEY_PREFIX + type);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

/* Restore from KV first (cross-browser), fall back to localStorage */
async function restoreAutoSaves() {
  var types = ['all', 'p3spv'];
  var kvRestored = [], localRestored = [];

  /* Try KV for each type */
  for (var i = 0; i < types.length; i++) {
    var type = types[i];
    try {
      var resp = await fetch(WORKER_URL + '/newsletter?id=' + AUTOSAVE_KV_ID[type]);
      if (resp.ok) {
        var data = await resp.json();
        if (data && data.text && !data.error) {
          newsletters[type] = data.text;
          /* Use stored charts array directly - most reliable, no markdown parsing needed */
          if (data.charts && data.charts.length) {
            allCharts[type] = data.charts;
          } else {
            allCharts[type] = extractCharts(data.text || '');
          }
          selectedCharts[type] = allCharts[type].slice();
          kvRestored.push((SHEET_CONFIGS[type]||{}).label || type);
          setFavicon((SHEET_CONFIGS[type]||{}).brand || 'sagehouse');
          setTitle(type);
          try { localStorage.setItem(AUTOSAVE_KEY_PREFIX + type, JSON.stringify({
            text: data.text, rawMarkdown: data.rawMarkdown || null,
            savedAt: data.savedAt, type: type,
            label: (SHEET_CONFIGS[type]||{}).label || type
          })); } catch(e) {}
        }
      }
    } catch(e) {
      /* KV failed - try localStorage */
      var saved = loadAutoSave(type);
      if (saved && saved.text) {
        newsletters[type] = saved.text;
        if (saved.charts && saved.charts.length) {
          allCharts[type] = saved.charts;
        } else {
          allCharts[type] = extractCharts(saved.text || '');
        }
        selectedCharts[type] = allCharts[type].slice();
        localRestored.push(saved.label || type);
      }
    }
  }

  var allRestored = kvRestored.concat(localRestored);
  if (allRestored.length > 0) {
    showNewsletterForType(currentType);
    var src = kvRestored.length > 0 ? ' (synced from cloud)' : ' (local)';
    /* Warn if charts couldn't be restored (old save format without charts array) */
    var missingCharts = [];
    var types2 = ['all', 'p3spv'];
    for (var mi = 0; mi < types2.length; mi++) {
      if (newsletters[types2[mi]] && (!allCharts[types2[mi]] || !allCharts[types2[mi]].length)) {
        missingCharts.push((SHEET_CONFIGS[types2[mi]]||{}).label || types2[mi]);
      }
    }
    if (missingCharts.length) {
      showStatus('loading', 'Restored: ' + allRestored.join(', ') + src + '. Charts need one regenerate to restore fully.');
    } else {
      showStatus('success', 'Restored: ' + allRestored.join(', ') + src);
    }
    /* Pre-fetch sheet data + tab data so chart builder is ready when needed */
    fetchSheetData(currentType).then(function(sd) {
      if (sd) {
        sheetDataCache = sd;
        populateChartBuilderMetrics(sd, window._opsDataCache || null);
        prefillChartBuilderDates(sd.allRows);
        _multiTabPopulated = false;
        populateMultiTabChartBuilder();
      }
    }).catch(function() {});
  }
}

/* Show the saves panel */
function showSavesPanel() {
  var panel = document.getElementById('savesPanel');
  if (!panel) return;
  if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }
  refreshSavesPanel();
  panel.style.display = 'block';
}

var _savesCache = null; /* cached KV data */
var _savesCurrentTab = 'shares';
var _savesCurrentType = 'both';

async function refreshSavesPanel() {
  var listEl = document.getElementById('savesList');
  if (!listEl) return;

  /* Fetch from KV only if not cached */
  if (!_savesCache) {
    listEl.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:12px 0;">Loading...</div>';
    try {
      var resp = await fetch(WORKER_URL + '/newsletter/list');
      if (resp.ok) {
        var data = await resp.json();
        _savesCache = data.saves || [];
      } else { _savesCache = []; }
    } catch(e) { _savesCache = []; }
  }

  renderSavesList();
}

function switchSavesTab(tab) {
  _savesCurrentTab = tab;
  var tabs = document.querySelectorAll('.saves-tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === tab);
  }
  renderSavesList();
}

function filterSavesType(type) {
  _savesCurrentType = type;
  var btns = document.querySelectorAll('.saves-type-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].getAttribute('data-filter') === type);
  }
  renderSavesList();
}

function renderSavesList() {
  var listEl = document.getElementById('savesList');
  if (!listEl || !_savesCache) return;

  var tab = _savesCurrentTab;
  var typeFilter = _savesCurrentType;

  /* Filter saves based on current tab */
  var filtered;
  if (tab === 'shares') {
    filtered = _savesCache.filter(function(s) { return s.id && s.id.indexOf('monthly-') === 0; });
  } else if (tab === 'drafts') {
    filtered = _savesCache.filter(function(s) { return s.saveType === 'draft' || (s.named && s.id.indexOf('monthly-') !== 0 && !s.autoSave); });
  } else {
    filtered = _savesCache.filter(function(s) { return s.autoSave || s.id === 'autosave-all-entities' || s.id === 'autosave-p3spv'; });
  }

  /* Apply type filter */
  if (typeFilter !== 'both') {
    filtered = filtered.filter(function(s) { return s.type === typeFilter; });
  }

  if (filtered.length === 0) {
    var emptyMsg = tab === 'shares' ? 'No shared investor links yet. Click Share to create one.'
                 : tab === 'drafts' ? 'No saved newsletters yet. Click Save to create one.'
                 : 'No auto-drafts found.';
    listEl.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:16px 0;text-align:center;">' + emptyMsg + '</div>';
    return;
  }

/* === NAMED KV SAVES === */

/* Save current newsletter to KV with a user-provided name */
async function saveToCloud() {
  var text = newsletters[currentType];
  if (!text) { showStatus('error', 'Generate a newsletter first.'); return; }
  var name = prompt('Name this save (e.g. "April 2026 - draft 1"):');
  if (!name || !name.trim()) return;
  showStatus('loading', 'Saving to cloud...');
  try {
    var cfg = SHEET_CONFIGS[currentType] || {};
    var body = document.getElementById('newsletterBody');
    var content = (body && body.innerHTML) ? body.innerHTML : text;
    var resp = await fetch(WORKER_URL + '/newsletter', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: content,
        type: currentType,
        title: (cfg.label || '') + ' Newsletter',
        name: name.trim(),
        named: true
      })
    });
    if (!resp.ok) throw new Error('Worker ' + resp.status);
    var result = await resp.json();
    if (result.error) throw new Error(result.error);
    showStatus('success', 'Saved to cloud as "' + name.trim() + '" (ID: ' + result.id + ')');
    /* Also store the ID locally so we can list it */
    storeCloudSaveRef(result.id, name.trim(), currentType, (cfg.label || '') + ' Newsletter');
    refreshSavesPanel();
  } catch(err) {
    console.error('Cloud save error:', err);
    showStatus('error', 'Save failed: ' + err.message);
  }
}

/* Store a reference to a cloud save in localStorage so we can list them */
var CLOUD_REFS_KEY = 'sh_newsletter_cloud_refs';

function storeCloudSaveRef(id, name, type, title) {
  try {
    var refs = getCloudSaveRefs();
    refs.unshift({ id: id, name: name, type: type, title: title, savedAt: new Date().toISOString() });
    /* Keep max 20 refs */
    if (refs.length > 20) refs = refs.slice(0, 20);
    localStorage.setItem(CLOUD_REFS_KEY, JSON.stringify(refs));
  } catch(e) { console.warn('Could not store cloud ref:', e); }
}

function getCloudSaveRefs() {
  try {
    var raw = localStorage.getItem(CLOUD_REFS_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function deleteCloudSaveRef(id) {
  try {
    var refs = getCloudSaveRefs().filter(function(r) { return r.id !== id; });
    localStorage.setItem(CLOUD_REFS_KEY, JSON.stringify(refs));
  } catch(e) {}
}

/* Load a cloud save by ID */
async function loadCloudSave(id, type) {
  showStatus('loading', 'Loading from cloud...');
  try {
    var resp = await fetch(WORKER_URL + '/newsletter?id=' + encodeURIComponent(id));
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    if (data.error) throw new Error(data.error);
    var t = type || data.type || currentType;
    newsletters[t] = data.text || '';
    if (data.charts && data.charts.length) {
      allCharts[t] = data.charts;
    } else {
      allCharts[t] = extractCharts(data.text || '');
    }
    selectedCharts[t] = allCharts[t].slice();
    autoSave(t, data.text || '');
    var cards = document.querySelectorAll('[data-type="' + t + '"]');
    if (cards.length > 0) setType(t, cards[0]);
    else showNewsletterForType(t);
    document.getElementById('savesPanel').style.display = 'none';
    showStatus('success', 'Newsletter loaded from cloud.');
  } catch(err) {
    showStatus('error', 'Load failed: ' + err.message + '. Link may have expired (90 day limit).');
  }
}

async function buildCustomChart() {
  /* Debug */
  var dbgSel = document.getElementById('chartBuilderMetric');
  /* Ensure sheet data is loaded */
  if (!sheetDataCache) {
    showStatus('loading', 'Loading sheet data...');
    try {
      var sd = await fetchSheetData(currentType);
      if (sd) {
        sheetDataCache = sd;
        populateChartBuilderMetrics(sd, window._opsDataCache || null);
        prefillChartBuilderDates(sd.allRows);
        _multiTabPopulated = false;
        await populateMultiTabChartBuilder();
      }
    } catch(e) {}
  }
  /* Ensure multi-tab data is loaded */
  if (!_multiTabPopulated) {
    await populateMultiTabChartBuilder();
  }

  var ctype  = (document.getElementById('chartBuilderType') || {}).value || 'line';
  var sm = document.getElementById('chartBuilderStartMonth'), sy = document.getElementById('chartBuilderStartYear');
  var em = document.getElementById('chartBuilderEndMonth'),   ey = document.getElementById('chartBuilderEndYear');

  /* Resolve metrics — auto-fetch tab data if missing */
  var m1 = await resolveMetricAsync('chartBuilderMetric');
  if (!m1) { showStatus('error', 'Please select at least one metric.'); return; }

  var m2 = null, m3 = null;
  var isDual = ctype === 'dual';
  var isMulti = ctype === 'multi';
  if (isDual || isMulti) {
    m2 = await resolveMetricAsync('chartBuilderMetric2');
  }
  if (isMulti) {
    m3 = await resolveMetricAsync('chartBuilderMetric3');
  }

  /* Build date range */
  var startKey = (sm ? sm.value : 'Jan') + ' ' + (sy ? sy.value : '2024');
  var endKey   = (em ? em.value : 'Dec') + ' ' + (ey ? ey.value : '2026');

  /* Get axis labels */
  var label1El = document.getElementById('chartBuilderLabel1');
  var label2El = document.getElementById('chartBuilderLabel2');
  var axisLabel1 = label1El ? label1El.value.trim() : m1.name;
  var axisLabel2 = label2El ? label2El.value.trim() : (m2 ? m2.name : '');

  /* Extract data within date range */
  /* Parse various date formats */
  function parseFlexDate(str) {
    if (!str) return null;
    str = str.trim();
    /* Try standard Date parse first (handles "4/30/2026", "2026-04-30", etc.) */
    var d = new Date(str);
    if (!isNaN(d) && d.getFullYear() > 2000) return d;
    /* Try "Mon YYYY" or "Month YYYY" */
    var m2 = str.match(/^([A-Za-z]+)\s+(\d{4})$/);
    if (m2) { d = new Date(m2[1] + ' 1, ' + m2[2]); if (!isNaN(d)) return d; }
    /* Try "MM/YYYY" */
    var m3 = str.match(/^(\d{1,2})\/(\d{4})$/);
    if (m3) return new Date(parseInt(m3[2]), parseInt(m3[1]) - 1, 1);
    return null;
  }

  function extractSeries(metric) {
    if (!metric) return { labels: [], values: [] };
    var labels = [], values = [];
    var MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    function toDateKey(key) {
      /* Convert "05 2023" to "May 2023", pass through "May 2023" unchanged */
      var parts = key.split(' ');
      if (parts.length === 2) {
        var mn = parseInt(parts[0], 10);
        if (!isNaN(mn) && mn >= 1 && mn <= 12) return MONTH_NAMES[mn-1] + ' ' + parts[1];
      }
      return key;
    }
    var rangeStart = new Date('1 ' + toDateKey(startKey));
    var rangeEnd   = new Date('1 ' + toDateKey(endKey));
    /* Extend end to last day of month */
    rangeEnd.setMonth(rangeEnd.getMonth() + 1);
    rangeEnd.setDate(0);



    for (var i = 0; i < metric.sourceRows.length; i++) {
      var row = metric.sourceRows[i];
      var dateStr = (row[0] || '').trim();
      if (!dateStr) continue;
      var d = parseFlexDate(dateStr);
      if (!d) continue;
      /* Range filter */
      if (d < rangeStart || d > rangeEnd) continue;
      labels.push(d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
      var rawVal = (row[metric.colIdx] || '').toString().replace(/[$,%\s]/g, '').trim();
      /* Handle parenthesized negatives like (1234) */
      if (rawVal.charAt(0) === '(' && rawVal.charAt(rawVal.length - 1) === ')') {
        rawVal = '-' + rawVal.substring(1, rawVal.length - 1);
      }
      values.push(parseFloat(rawVal) || 0);
    }


    return { labels: labels, values: values };
  }

  var s1 = extractSeries(m1);
  if (!s1.labels.length) { showStatus('error', 'No data found for the selected date range.'); return; }

  var chartDef = {
    title: (isDual ? axisLabel1 + ' vs ' + axisLabel2 : m1.name).toUpperCase() +
           ' — ' + startKey.toUpperCase() + ' TO ' + endKey.toUpperCase(),
    type: (ctype === 'multi' || ctype === 'dual') ? 'line' : ctype,
    data: s1.labels,
    series: [{ label: axisLabel1 || m1.name, values: s1.values }]
  };

  if (m2) {
    var s2 = extractSeries(m2);
    chartDef.series.push({ label: axisLabel2 || m2.name, values: s2.values });
  }
  if (m3) {
    var s3 = extractSeries(m3);
    var label3El = document.getElementById('chartBuilderLabel3');
    chartDef.series.push({ label: (label3El ? label3El.value.trim() : m3.name), values: s3.values });
  }
  if (isDual) chartDef.dualAxis = true;

  if (!customCharts[currentType]) customCharts[currentType] = [];
  customCharts[currentType].push(chartDef);

  /* Re-render entire charts tab so new chart appears in correct grid position */
  var chartsTab = document.getElementById('chartsTab');
  if (chartsTab && chartsTab.style.display !== 'none') {
    renderChartsTab();
  }
  showStatus('success', 'Chart added: ' + chartDef.title);
}

/* Async metric resolver — waits for tab data if needed */
async function resolveMetricAsync(selId) {
  var sel = document.getElementById(selId);
  if (!sel || !sel.value) return null;
  var val = sel.value;

  /* Legacy ops format */
  if (val.indexOf('ops:') === 0) {
    var ci = parseInt(val.replace('ops:', ''), 10);
    var ops = window._opsDataCache;
    if (!ops) return null;
    return { colIdx: ci, name: ops.hdr[ci] || 'Metric', sourceRows: ops.dataRows };
  }

  /* Multi-tab format: tabId:colIdx */
  var parts = val.split(':');
  if (parts.length >= 2) {
    var tabId = parts[0], colIdx = parseInt(parts[parts.length - 1], 10);
    var cached = _tabDataCache[tabId];
    if (!cached) {
      /* Tab not loaded — fetch it now and wait */
      var tabCfg = null;
      for (var t = 0; t < CHART_BUILDER_TABS.length; t++) {
        if (CHART_BUILDER_TABS[t].id === tabId) { tabCfg = CHART_BUILDER_TABS[t]; break; }
      }
      if (tabCfg) {
        showStatus('loading', 'Loading ' + tabCfg.label + '...');
        cached = await fetchTabData(tabCfg);
      }
      if (!cached) return null;
    }
    return { colIdx: colIdx, name: (cached.hdr[colIdx] || 'Metric'), sourceRows: cached.dataRows };
  }

  /* Legacy financial: just a number */
  var colIdx2 = parseInt(val, 10);
  if (!isNaN(colIdx2) && sheetDataCache) {
    return { colIdx: colIdx2, name: sheetDataCache.hdr[colIdx2] || 'Metric', sourceRows: sheetDataCache.allRows };
  }
  return null;
}

function insertChartAtSection(idx) {
  var chart = (customCharts[currentType] || [])[idx];
  if (!chart) return;
  var body = document.getElementById('newsletterBody');
  if (!body) { showStatus('error', 'Generate a newsletter first.'); return; }

  var sel = document.getElementById('chart-section-' + idx);
  var anchorId = sel ? sel.value : '__end__';

  var wrapper = buildChartWrapper(chart);

  if (anchorId === '__start__') {
    body.insertBefore(wrapper, body.firstChild);
  } else if (anchorId === '__end__') {
    body.appendChild(wrapper);
  } else {
    var anchor = document.getElementById(anchorId);
    if (anchor) {
      /* Insert after the section heading and its immediately following paragraph */
      var insertAfter = anchor;
      var next = anchor.nextSibling;
      /* Skip one paragraph after the heading if present */
      if (next && next.nodeName === 'P') insertAfter = next;
      if (insertAfter.nextSibling) {
        body.insertBefore(wrapper, insertAfter.nextSibling);
      } else {
        body.appendChild(wrapper);
      }
    } else {
      body.appendChild(wrapper);
    }
  }

  setTimeout(function() {
    var c = document.getElementById(wrapper._canvasId);
    if (c) renderSingleChart(c, chart);
    setupChartDrag(wrapper);
  }, 60);

  /* Switch to newsletter tab to show result */
  switchTab('newsletter', document.querySelector('.tab'));

  /* Auto-save the insertion */
  newsletters[currentType] = body.innerHTML;
  autoSave(currentType, body.innerHTML, _lastRawMarkdown[currentType]);

  showStatus('success', 'Chart inserted. Enter Edit mode to drag it to a different position.');
}

/* === TOGGLE PANELS === */
function toggleChartPicker() {
  var panel = document.getElementById('chartPickerPanel');
  var btn   = document.getElementById('chartPickerBtn');
  var isOpen = panel && panel.style.display !== 'none';
  if (panel) panel.style.display = isOpen ? 'none' : 'block';
  if (btn)   btn.classList.toggle('active', !isOpen);
  if (!isOpen) {
    var charts = allCharts[currentType] || [];
    if (!charts.length) { showStatus('error', 'Generate a newsletter first.'); panel.style.display = 'none'; btn.classList.remove('active'); return; }
    showChartPickerContent();
  }
}
function toggleSavesPanel() {
  var panel = document.getElementById('savesPanel');
  var btn   = document.getElementById('savesPanelBtn');
  var isOpen = panel && panel.style.display !== 'none';
  if (panel) panel.style.display = isOpen ? 'none' : 'block';
  if (btn)   btn.classList.toggle('active', !isOpen);
  if (!isOpen) {
    _savesCache = null; /* force fresh fetch */
    refreshSavesPanel();
  }
}
/* Keep old showSavesPanel as alias */
function showSavesPanel() { toggleSavesPanel(); }
/* Keep old showChartPicker as alias */
function showChartPicker() { toggleChartPicker(); }
function showChartPickerContent() {
  var panel = document.getElementById('chartPickerPanel'), list = document.getElementById('chartPickerList');
  var charts = allCharts[currentType] || [];
  if (!panel || !list) return;
  var sel = selectedCharts[currentType] || [], html = '';
  for (var i = 0; i < charts.length; i++) {
    var chk = sel.indexOf(charts[i]) >= 0 ? 'checked' : '';
    html += '<label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:13px;padding:8px 0;border-bottom:1px solid var(--border);">' +
            '<input type="checkbox" data-chart-idx="' + i + '" ' + chk + ' style="width:16px;height:16px;cursor:pointer;margin-top:2px;">' +
            '<div><div style="font-weight:600;">' + (charts[i].title || 'Chart ' + (i+1)) + '</div>' +
            '<div style="font-size:11px;color:var(--muted);">' + (charts[i].type || 'bar') + ' chart</div></div></label>';
  }
  list.innerHTML = html;
}


/* === CHART DRAG-TO-REPOSITION (Edit mode) === */

var _dragSrc = null;

function setupChartDrag(wrapper) {
  wrapper.setAttribute('draggable', 'true');
  wrapper.addEventListener('dragstart', function(e) {
    _dragSrc = wrapper;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', ''); /* required for Firefox */
    wrapper.style.opacity = '0.45';
  });
  wrapper.addEventListener('dragend', function() {
    wrapper.style.opacity = '1';
    _dragSrc = null;
    /* Re-render canvas after drop (canvas doesn't survive innerHTML moves) */
    setTimeout(function() {
      if (wrapper._chartDef && wrapper._canvasId) {
        var c = document.getElementById(wrapper._canvasId);
        if (c) renderSingleChart(c, wrapper._chartDef);
      }
    }, 80);
  });
}

function setupAllChartDragging() {
  var body = document.getElementById('newsletterBody');
  if (!body) return;

  /* Make all chart-draggable wrappers draggable */
  var wrappers = body.querySelectorAll('.chart-draggable');
  for (var i = 0; i < wrappers.length; i++) setupChartDrag(wrappers[i]);

  /* Newsletter body is the drop target */
  body.addEventListener('dragover', function(e) {
    if (!_dragSrc) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    /* Highlight nearest drop zone */
    var target = getDropTarget(e.clientY);
    clearDropHighlights(body);
    if (target) target.classList.add('drop-target-highlight');
  });

  body.addEventListener('dragleave', function() {
    clearDropHighlights(body);
  });

  body.addEventListener('drop', function(e) {
    e.preventDefault();
    clearDropHighlights(body);
    if (!_dragSrc) return;
    var target = getDropTarget(e.clientY);
    if (target && target !== _dragSrc) {
      /* Insert before the target element */
      body.insertBefore(_dragSrc, target);
    } else if (!target) {
      body.appendChild(_dragSrc);
    }
    /* Re-render chart canvas */
    setTimeout(function() {
      if (_dragSrc && _dragSrc._chartDef && _dragSrc._canvasId) {
        var c = document.getElementById(_dragSrc._canvasId);
        if (c) renderSingleChart(c, _dragSrc._chartDef);
      }
      /* Save after reorder */
      newsletters[currentType] = body.innerHTML;
      autoSave(currentType, body.innerHTML);
      _dragSrc = null;
    }, 80);
  });
}

function getDropTarget(clientY) {
  var body = document.getElementById('newsletterBody');
  if (!body) return null;
  var children = body.children;
  for (var i = 0; i < children.length; i++) {
    var rect = children[i].getBoundingClientRect();
    var midY = rect.top + rect.height / 2;
    if (clientY < midY) return children[i];
  }
  return null;
}

function clearDropHighlights(body) {
  var els = body.querySelectorAll('.drop-target-highlight');
  for (var i = 0; i < els.length; i++) els[i].classList.remove('drop-target-highlight');
}



/* === IMAGE DRAG-TO-REPOSITION (Edit mode) === */

function setupImageDrag(wrapper) {
  wrapper.addEventListener('dragstart', function(e) {
    _dragSrc = wrapper;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
    wrapper.style.opacity = '0.4';
  });
  wrapper.addEventListener('dragend', function() {
    wrapper.style.opacity = '1';
    _dragSrc = null;
    /* Auto-save after drag */
    var body = document.getElementById('newsletterBody');
    if (body) { newsletters[currentType] = body.innerHTML; autoSave(currentType, body.innerHTML); }
  });
}

function setupAllImageDragging() {
  var body = document.getElementById('newsletterBody');
  if (!body) return;
  var wrappers = body.querySelectorAll('.image-draggable');
  for (var i = 0; i < wrappers.length; i++) setupImageDrag(wrappers[i]);
}

/* === PRE-FILL CHART BUILDER DATES FROM GENERATED RANGE === */
function prefillChartBuilderDates(filteredRows) {
  if (!filteredRows || !filteredRows.length) return;
  var first = parseRowDate(filteredRows[0][0]);
  var last  = parseRowDate(filteredRows[filteredRows.length - 1][0]);
  if (!first || !last) return;
  var months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
  var sm = document.getElementById('chartBuilderStartMonth');
  var sy = document.getElementById('chartBuilderStartYear');
  var em = document.getElementById('chartBuilderEndMonth');
  var ey = document.getElementById('chartBuilderEndYear');
  if (sm) sm.value = months[first.getMonth()];
  if (sy) sy.value = String(first.getFullYear());
  if (em) em.value = months[last.getMonth()];
  if (ey) ey.value = String(last.getFullYear());
}


/* === PERSIST CONTEXT FIELD VALUES === */
var CTX_STORAGE_KEY = 'sh_context_fields';

function saveContextFields() {
  try {
    var fields = document.querySelectorAll('#contextFieldsContainer input, #contextFieldsContainer textarea');
    var vals = {};
    for (var i = 0; i < fields.length; i++) {
      if (fields[i].id) vals[fields[i].id] = fields[i].value;
    }
    /* Also save shared fields outside the container */
    var shared = ['unusualItems', 'focusItems'];
    for (var j = 0; j < shared.length; j++) {
      var el = document.getElementById(shared[j]);
      if (el) vals[shared[j]] = el.value;
    }
    localStorage.setItem(CTX_STORAGE_KEY + '_' + currentType, JSON.stringify(vals));
  } catch(e) {}
}

function restoreContextFields() {
  try {
    var raw = localStorage.getItem(CTX_STORAGE_KEY + '_' + currentType);
    if (!raw) return;
    var vals = JSON.parse(raw);
    for (var id in vals) {
      var el = document.getElementById(id);
      if (el && vals[id]) el.value = vals[id];
    }
  } catch(e) {}
}

function setupContextFieldPersistence() {
  var container = document.getElementById('contextFieldsContainer');
  if (!container) return;
  /* Debounced save on any input change */
  var saveTimer = null;
  container.addEventListener('input', function() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveContextFields, 600);
  });
}
































function copyShareLink(kvId, type) {
  var url = WORKER_URL + '/view/' + kvId + '?type=' + type;
  try {
    navigator.clipboard.writeText(url).then(function() {

    });

  }
}

window.addEventListener('beforeunload', function(e) {
  if (_editsDirty && isEditMode) {
    e.preventDefault();
    e.returnValue = '';
  }
});
