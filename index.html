<script>
  // ── Config ──────────────────────────────────────────────
  const WORKER_URL = 'https://p3-claude-proxy.jim-c.workers.dev';

  // ── State ────────────────────────────────────────────────
  let currentType = 'sagehouse';
  let currentNewsletter = '';
  let parsedCharts = [];
  let chartInstances = [];

  // ── Type selection ───────────────────────────────────────
  function setType(type, el) {
    currentType = type;
    document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const labels = {
      sagehouse: 'SageHouse Group Newsletter',
      spv1: 'SPV1 Standalone Newsletter',
      proof3: 'proof3 Group Newsletter'
    };
    document.getElementById('outputTitle').textContent = labels[type];
    document.getElementById('headerMeta').textContent = labels[type];
  }

  // ── Tab switching ─────────────────────────────────────────
  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('newsletterTab').style.display =
      tab === 'newsletter' ? 'block' : 'none';
    document.getElementById('chartsTab').style.display =
      tab === 'charts' ? 'block' : 'none';
    if (tab === 'charts' && parsedCharts.length > 0 &&
        chartInstances.length === 0) {
      renderCharts();
    }
  }

  // ── Status helper ─────────────────────────────────────────
  function showStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = 'status-bar show ' + type;
    el.textContent = msg;
  }

  // ── Google Sheets CSV fetcher ─────────────────────────────
  const SHEET_CONFIGS = {
    allentities: {
      sheetId: '1bKBvKEUvLXdpi3Ft5KjrBp3Vs_Xq_chn8xZAmvdso3g',
      gid: '1138458495'
    sagehouse: {
      sheetId: '1bKBvKEUvLXdpi3Ft5KjrBp3Vs_Xq_chn8xZAmvdso3g',
      gid: '932717608'
    },
    proof3withoutspv: {
      sheetId: '1bKBvKEUvLXdpi3Ft5KjrBp3Vs_Xq_chn8xZAmvdso3g',
      gid: '1747727086'
    proof3withspv: {
      sheetId: '1bKBvKEUvLXdpi3Ft5KjrBp3Vs_Xq_chn8xZAmvdso3g',
      gid: '352846057'
    },
    spv1only: {
      sheetId: '1bKBvKEUvLXdpi3Ft5KjrBp3Vs_Xq_chn8xZAmvdso3g',
      gid: '1695455761'
    }
  };

  async function fetchSheetData(newsletterType) {
    const config = SHEET_CONFIGS[newsletterType];
    if (!config) throw new Error('Unknown newsletter type: ' + newsletterType);

    const url = `https://docs.google.com/spreadsheets/d/${config.sheetId}/export?format=csv&gid=${config.gid}`;
    const response = await fetch(url);

    if (!response.ok) {
      throw new Error(
        'Could not read sheet. Make sure it is shared as "Anyone with the link can view". Status: ' + response.status
      );
    }

    const csv = await response.text();
    return parseAndCleanCsv(csv);
  }

  function parseAndCleanCsv(csv) {
    const lines = csv.split('\n').filter(l => l.trim());
    if (lines.length < 3) throw new Error('Sheet appears empty or not loaded yet.');

    const rows = lines.map(parseCsvLine);

    // Find header row containing month names
    const headerRowIndex = rows.findIndex(row =>
      row.some(cell => /jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec/i.test(cell))
    );

    if (headerRowIndex === -1) {
      throw new Error('Could not find month headers. Check the Master KPI tab structure.');
    }

    const headers = rows[headerRowIndex];
    const totalCols = headers.length;
    const startCol = Math.max(1, totalCols - 12);
    const monthHeaders = headers.slice(startCol);

    const dataRows = rows
      .slice(headerRowIndex + 1)
      .filter(row => row[0] && row[0].trim());

    let table = `Metric\t${monthHeaders.join('\t')}\n`;
    table += '-'.repeat(80) + '\n';

    dataRows.forEach(row => {
      const metricName = row[0];
      const values = row.slice(startCol).map(v => {
        const cleaned = v.replace(/[$,%]/g, '').trim();
        const num = parseFloat(cleaned);
        if (!isNaN(num) && v.includes('%')) return num.toFixed(1) + '%';
        if (!isNaN(num) && Math.abs(num) >= 1000000)
          return '$' + (num / 1000000).toFixed(2) + 'M';
        if (!isNaN(num) && Math.abs(num) >= 1000)
          return '$' + (num / 1000).toFixed(1) + 'k';
        return v.trim();
      });
      table += `${metricName}\t${values.join('\t')}\n`;
    });

    return {
      table,
      rowCount: dataRows.length,
      colCount: monthHeaders.length
    };
  }

  function parseCsvLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') {
        inQuotes = !inQuotes;
      } else if (line[i] === ',' && !inQuotes) {
        result.push(current.trim());
        current = '';
      } else {
        current += line[i];
      }
    }
    result.push(current.trim());
    return result;
  }

  // ── Main generate flow ────────────────────────────────────
  async function generate() {
    const btn = document.getElementById('generateBtn');
    const context = document.getElementById('context').value;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Fetching sheet data...';
    showStatus('loading', 'Reading Master KPI tab from Google Sheets...');

    try {
      const sheetData = await fetchSheetData(currentType);

      showStatus('loading',
        'Loaded ' + sheetData.rowCount + ' metrics x ' +
        sheetData.colCount + ' months. Calling Claude...');
      btn.innerHTML = '<span class="spinner"></span>Generating newsletter...';

      const { systemPrompt, userMessage } = buildPrompts(
        currentType, sheetData.table, context
      );

      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: systemPrompt,
          messages: [{ role: 'user', content: userMessage }]
        })
      });

      const result = await response.json();
      if (result.error) throw new Error(result.error.message || result.error);

      const text = result.content[0].text;
      currentNewsletter = text;
      parsedCharts = extractCharts(text);
      chartInstances = [];

      renderNewsletter(text);
      showStatus('success',
        'Done. ' + result.usage.input_tokens.toLocaleString() +
        ' tokens in, ' + result.usage.output_tokens.toLocaleString() + ' out.');

      document.getElementById('outputMeta').textContent =
        new Date().toLocaleDateString('en-US',
          { month: 'long', day: 'numeric', year: 'numeric' });

    } catch (err) {
      showStatus('error', 'Error: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Generate Newsletter';
    }
  }

  // ── Render newsletter ─────────────────────────────────────
  function renderNewsletter(text) {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('newsletterContent').style.display = 'block';

    const body = document.getElementById('newsletterBody');
    let chartIndex = 0;
    let html = '';

    const parts = text.split(/(```chart[\s\S]*?```)/g);
    parts.forEach(part => {
      if (part.startsWith('```chart')) {
        chartIndex++;
        const id = 'chart-inline-' + (chartIndex - 1);
        html += `
          <div class="chart-embed">
            <div class="chart-label">Chart ${chartIndex}</div>
            <canvas id="${id}" height="180"></canvas>
          </div>`;
      } else {
        html += markdownToHtml(part);
      }
    });

    body.innerHTML = html;

    setTimeout(() => {
      parsedCharts.forEach((chart, i) => {
        const canvas = document.getElementById('chart-inline-' + i);
        if (canvas) renderSingleChart(canvas, chart);
      });
    }, 50);
  }

  function markdownToHtml(text) {
    return text
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n\n+/g, '</p><p>')
      .replace(/^(?!<[h|p])(.+)$/gm, '<p>$1</p>')
      .replace(/<p><\/p>/g, '')
      .trim();
  }

  function extractCharts(text) {
    const charts = [];
    const regex = /```chart\n([\s\S]*?)```/g;
    let match;
    while ((match = regex.exec(text)) !== null) {
      try { charts.push(JSON.parse(match[1])); }
      catch (e) { console.warn('Chart parse error:', e); }
    }
    return charts;
  }

  function renderCharts() {
    const grid = document.getElementById('chartsGrid');
    grid.innerHTML = '';
    chartInstances = [];

    if (parsedCharts.length === 0) {
      grid.innerHTML = '<p style="color:var(--muted)">No charts found.</p>';
      return;
    }

    parsedCharts.forEach((chart, i) => {
      const card = document.createElement('div');
      card.className = 'chart-card';
      card.innerHTML =
        '<div class="chart-card-title">' + (chart.title || 'Chart ' + (i + 1)) + '</div>' +
        '<canvas id="chart-tab-' + i + '" height="200"></canvas>';
      grid.appendChild(card);
      setTimeout(() => {
        const canvas = document.getElementById('chart-tab-' + i);
        if (canvas) chartInstances.push(renderSingleChart(canvas, chart));
      }, 50);
    });
  }

  function renderSingleChart(canvas, chart) {
    const labels = chart.data.map(d => d.month);
    const datasets = (chart.series || []).map(s => ({
      label: s.name,
      data: chart.data.map(d => d[s.key] || 0),
      backgroundColor: chart.type === 'bar'
        ? chart.data.map(d => (d[s.key] || 0) < 0 ? '#C0392B33' : s.color + '33')
        : s.color + '22',
      borderColor: chart.type === 'bar'
        ? chart.data.map(d => (d[s.key] || 0) < 0 ? '#C0392B' : s.color)
        : s.color,
      borderWidth: 2,
      fill: chart.type === 'area',
      tension: 0.35,
      pointRadius: 3,
      pointHoverRadius: 5
    }));

    return new Chart(canvas, {
      type: chart.type === 'area' ? 'line' : (chart.type || 'bar'),
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: {
          legend: {
            display: datasets.length > 1,
            position: 'bottom',
            labels: { font: { size: 11 }, boxWidth: 12, padding: 12 }
          },
          tooltip: {
            callbacks: {
              label: ctx => {
                const v = ctx.parsed.y;
                if (Math.abs(v) >= 1000000)
                  return ctx.dataset.label + ': $' + (v / 1000000).toFixed(2) + 'M';
                if (Math.abs(v) >= 1000)
                  return ctx.dataset.label + ': $' + (v / 1000).toFixed(1) + 'k';
                return ctx.dataset.label + ': ' + v;
              }
            }
          }
        },
        scales: {
          y: {
            grid: { color: '#f0f0f0' },
            ticks: {
              font: { size: 10 },
              callback: v => {
                if (Math.abs(v) >= 1000000) return '$' + (v / 1000000).toFixed(1) + 'M';
                if (Math.abs(v) >= 1000) return '$' + (v / 1000).toFixed(0) + 'k';
                return v;
              }
            }
          },
          x: {
            grid: { display: false },
            ticks: { font: { size: 10 } }
          }
        }
      }
    });
  }

  function copyNewsletter() {
    const clean = currentNewsletter.replace(/```chart[\s\S]*?```/g, '');
    navigator.clipboard.writeText(clean.trim()).then(() => {
      showStatus('success', 'Newsletter text copied to clipboard.');
    });
  }

  function exportToDoc() {
    const clean = currentNewsletter
      .replace(/```chart[\s\S]*?```/g, '[Chart]')
      .trim();
    navigator.clipboard.writeText(clean).then(() => {
      showStatus('success', 'Newsletter copied. Opening Google Docs - paste with Cmd+V.');
      setTimeout(() => {
        window.open('https://docs.google.com/document/create', '_blank');
      }, 800);
    });
  }

  function buildPrompts(type, kpiData, context) {
    const typeLabels = {
      sagehouse: 'SageHouse Group (TSH + SHC + SHA)',
      spv1: 'SPV1 Standalone',
      proof3: 'proof3 Group (SPV1 + Training + Coaching + Gym 1)'
    };

    const audienceContext = {
      sagehouse: `These are SageHouse Group investors. They care about total portfolio
value, proof3 progress, advisory revenue, cash position, and whether the investment
thesis is playing out. Do NOT detail individual proof3 operating metrics.`,
      spv1: `These are SPV1 standalone investors. They care about SPV1 balance sheet,
the convertible note structure, and proof3 as the underlying asset.`,
      proof3: `These are proof3/SPV1 investors. They care EXCLUSIVELY about proof3
operating metrics: member count, revenue, burn rate, path to profitability.
Do NOT include broader SageHouse portfolio updates.`
    };

    const systemPrompt = `You generate monthly investor newsletters for The SageHouse.

ENTITY STRUCTURE:
The SageHouse (TSH) owns SageHouse Capital (SHC) and SageHouse Advisors (SHA).
SHC owns SageHouse Capital SPV1, which owns proof3 Training Inc (proof3 Coaching + proof3 Gym 1 Phoenix).
TSH invests in early-stage fitness, health, and wellness technology companies.
proof3 Gym 1 is in Scottsdale/Salt River AZ, opened Jan 2025. Breakeven at 100-110 members.
proof3 Coaching is profitable (~$12k/month net). Jason leads online coaching.

INVESTOR AUDIENCE:
${audienceContext[type]}

JIM'S WRITING VOICE:
- Direct, honest, personal. "I" for opinions, "we" for team actions
- Shares bad news as clearly as good news - never buries problems
- Mixes strategic narrative with specific numbers naturally
- Talks to investors like partners, not spectators
- No corporate language, no over-hedging, no formal sign-offs
- Writes with conviction

FORMAT RULES:
- 600-700 words maximum (prose only, not counting chart JSON)
- No bullet lists - everything flows as readable prose
- 5 chart JSON blocks embedded at appropriate points
- 1-2 sentences of narrative before each chart explaining the so-what
- Forward-looking personal close (2-3 sentences)

CHART JSON FORMAT - output charts exactly like this:
\`\`\`chart
{
  "type": "bar",
  "title": "Descriptive title",
  "data": [{"month": "Jan 24", "value": 50000}],
  "series": [{"key": "value", "name": "Series Name", "color": "#1B2A4A"}]
}
\`\`\`
Use "#1B2A4A" (navy) as primary color and "#C9A84C" (gold) as secondary.
For negative values use "#C0392B" (red) in the series color.`;

    const userMessage = `Generate the ${typeLabels[type]} investor newsletter.

MASTER KPI DATA (last 12 months, from Google Sheets):
${kpiData}

ADDITIONAL MONTHLY CONTEXT:
${context || 'No additional context provided.'}

Write the complete newsletter with 5 chart JSON blocks embedded inline.
Keep prose under 700 words. Write in Jim's voice throughout.`;

    return { systemPrompt, userMessage };
  }
</script>
